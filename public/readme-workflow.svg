<svg width="1200" height="210" viewBox="0 0 1200 210" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description">
  <title id="title">Luồng vận hành DermaHealth</title>
  <desc id="description">Từ đặt lịch đến theo dõi tiến triển</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0FDFA" />
      <stop offset="1" stop-color="#ECFEFF" />
    </linearGradient>
    <linearGradient id="line" x1="115" y1="105" x2="1085" y2="105" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14B8A6" />
      <stop offset="1" stop-color="#0891B2" />
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="1198" height="208" rx="24" fill="url(#bg)" stroke="#CCFBF1" stroke-width="2" />
  <path d="M115 93H1085" stroke="#99F6E4" stroke-width="4" stroke-linecap="round" />
  <path d="M115 93H1085" stroke="url(#line)" stroke-width="4" stroke-linecap="round" stroke-dasharray="90 880">
    <animate attributeName="stroke-dashoffset" values="0;-970" dur="6s" repeatCount="indefinite" />
  </path>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" text-anchor="middle">
    <g transform="translate(115 93)">
      <circle r="25" fill="#FFFFFF" stroke="#14B8A6" stroke-width="3" />
      <path d="M-8-7H8M-8 0H5M-8 7H2" stroke="#0F766E" stroke-width="2.5" stroke-linecap="round" />
      <circle r="31" fill="none" stroke="#14B8A6" opacity="0">
        <animate attributeName="r" values="25;37" dur="6s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.7;0;0" keyTimes="0;0.15;1" dur="6s" repeatCount="indefinite" />
      </circle>
      <text y="58" fill="#134E4A" font-size="15" font-weight="650">Đặt lịch</text>
    </g>
    <g transform="translate(309 93)">
      <circle r="25" fill="#FFFFFF" stroke="#14B8A6" stroke-width="3" />
      <rect x="-9" y="-9" width="18" height="18" rx="3" stroke="#0F766E" stroke-width="2.3" />
      <path d="M-4-4H0V0H-4V-4ZM3 3H7V7H3V3Z" fill="#0F766E" />
      <circle r="31" fill="none" stroke="#14B8A6" opacity="0">
        <animate attributeName="r" values="25;37" dur="6s" begin="-5s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.7;0;0" keyTimes="0;0.15;1" dur="6s" begin="-5s" repeatCount="indefinite" />
      </circle>
      <text y="58" fill="#134E4A" font-size="15" font-weight="650">Check-in QR</text>
    </g>
    <g transform="translate(503 93)">
      <circle r="25" fill="#FFFFFF" stroke="#14B8A6" stroke-width="3" />
      <circle cx="-7" cy="-4" r="3" fill="#0F766E" /><circle cx="7" cy="-4" r="3" fill="#0F766E" />
      <path d="M-12 8C-8 2-3 2 0 8C3 2 8 2 12 8" stroke="#0F766E" stroke-width="2.3" stroke-linecap="round" />
      <circle r="31" fill="none" stroke="#14B8A6" opacity="0">
        <animate attributeName="r" values="25;37" dur="6s" begin="-4s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.7;0;0" keyTimes="0;0.15;1" dur="6s" begin="-4s" repeatCount="indefinite" />
      </circle>
      <text y="58" fill="#134E4A" font-size="15" font-weight="650">Điều phối</text>
    </g>
    <g transform="translate(697 93)">
      <circle r="25" fill="#FFFFFF" stroke="#0891B2" stroke-width="3" />
      <path d="M0-12V12M-12 0H12" stroke="#0E7490" stroke-width="4" stroke-linecap="round" />
      <circle r="31" fill="none" stroke="#0891B2" opacity="0">
        <animate attributeName="r" values="25;37" dur="6s" begin="-3s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.7;0;0" keyTimes="0;0.15;1" dur="6s" begin="-3s" repeatCount="indefinite" />
      </circle>
      <text y="58" fill="#164E63" font-size="15" font-weight="650">Lượt khám</text>
    </g>
    <g transform="translate(891 93)">
      <circle r="25" fill="#FFFFFF" stroke="#0891B2" stroke-width="3" />
      <path d="M-9-11H6L11-6V11H-9V-11Z" stroke="#0E7490" stroke-width="2.2" stroke-linejoin="round" />
      <path d="M-4-3H6M-4 3H6" stroke="#0E7490" stroke-width="2" stroke-linecap="round" />
      <circle r="31" fill="none" stroke="#0891B2" opacity="0">
        <animate attributeName="r" values="25;37" dur="6s" begin="-2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.7;0;0" keyTimes="0;0.15;1" dur="6s" begin="-2s" repeatCount="indefinite" />
      </circle>
      <text y="58" fill="#164E63" font-size="15" font-weight="650">Hồ sơ</text>
    </g>
    <g transform="translate(1085 93)">
      <circle r="25" fill="#FFFFFF" stroke="#0891B2" stroke-width="3" />
      <path d="M-11 7L-4 0L2 4L12-8" stroke="#0E7490" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
      <circle r="31" fill="none" stroke="#0891B2" opacity="0">
        <animate attributeName="r" values="25;37" dur="6s" begin="-1s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.7;0;0" keyTimes="0;0.15;1" dur="6s" begin="-1s" repeatCount="indefinite" />
      </circle>
      <text y="58" fill="#164E63" font-size="15" font-weight="650">Theo dõi</text>
    </g>
  </g>

  <circle r="7" fill="#FFFFFF" stroke="#14B8A6" stroke-width="3" filter="url(#glow)">
    <animateMotion dur="6s" repeatCount="indefinite" path="M115 93H1085" />
  </circle>
</svg>
