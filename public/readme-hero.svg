<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description">
  <title id="title">DermaHealth</title>
  <desc id="description">Digital healthcare operations platform</desc>

  <defs>
    <linearGradient id="background" x1="72" y1="18" x2="1128" y2="282" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071C2C" />
      <stop offset="0.52" stop-color="#0B3B52" />
      <stop offset="1" stop-color="#075E64" />
    </linearGradient>
    <linearGradient id="pulse" x1="230" y1="220" x2="970" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9" stop-opacity="0" />
      <stop offset="0.18" stop-color="#67E8F9" />
      <stop offset="0.55" stop-color="#5EEAD4" />
      <stop offset="0.82" stop-color="#67E8F9" />
      <stop offset="1" stop-color="#67E8F9" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="glow">
      <stop stop-color="#5EEAD4" stop-opacity="0.2" />
      <stop offset="1" stop-color="#5EEAD4" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="card">
      <rect width="1200" height="300" rx="28" />
    </clipPath>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.09" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <g clip-path="url(#card)">
    <rect width="1200" height="300" fill="url(#background)" />
    <circle cx="1080" cy="28" r="260" fill="url(#glow)" />
    <circle cx="92" cy="280" r="220" fill="url(#glow)" opacity="0.65" />

    <g transform="translate(1048 102)" fill="none" stroke="#5EEAD4">
      <circle r="22" opacity="0.3">
        <animate attributeName="r" values="12;38" dur="2.8s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.55;0" dur="2.8s" repeatCount="indefinite" />
      </circle>
      <circle r="22" opacity="0.3">
        <animate attributeName="r" values="12;38" dur="2.8s" begin="-1.4s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.55;0" dur="2.8s" begin="-1.4s" repeatCount="indefinite" />
      </circle>
    </g>

    <g opacity="0.15" stroke="#A5F3FC">
      <path d="M0 58H1200" />
      <path d="M0 242H1200" />
      <path d="M116 0V300" />
      <path d="M1084 0V300" />
    </g>

    <g transform="translate(180 75)">
      <rect width="62" height="62" rx="18" fill="#5EEAD4" fill-opacity="0.12" stroke="#5EEAD4" stroke-opacity="0.55" />
      <path d="M25 14H37V25H48V37H37V48H25V37H14V25H25V14Z" fill="#99F6E4" />
      <animateTransform attributeName="transform" type="translate" values="180 75;180 68;180 75" dur="2.8s" repeatCount="indefinite" />
    </g>

    <text x="270" y="107" fill="#F0FDFA" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" font-weight="750" letter-spacing="-1.5">DermaHealth</text>
    <text x="272" y="145" fill="#A5F3FC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="500" letter-spacing="2.8">SMARTER CARE. SMOOTHER OPERATIONS.</text>

    <path d="M210 220H375L397 220L414 191L438 253L462 210L479 220H990" stroke="#164E63" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
    <path d="M210 220H375L397 220L414 191L438 253L462 210L479 220H990" stroke="url(#pulse)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)" stroke-dasharray="150 800">
      <animate attributeName="stroke-dashoffset" values="950;0" dur="3s" repeatCount="indefinite" />
    </path>

    <g fill="#99F6E4">
      <circle cx="1014" cy="89" r="4" opacity="0.65">
        <animate attributeName="cy" values="89;78;89" dur="3.2s" repeatCount="indefinite" />
      </circle>
      <circle cx="1052" cy="119" r="3" opacity="0.4">
        <animate attributeName="cy" values="119;108;119" dur="2.6s" begin="-0.8s" repeatCount="indefinite" />
      </circle>
      <circle cx="1091" cy="83" r="5" opacity="0.3">
        <animate attributeName="cy" values="83;69;83" dur="3.6s" begin="-1.4s" repeatCount="indefinite" />
      </circle>
    </g>

    <rect x="-320" y="0" width="240" height="300" fill="url(#scan)" opacity="0.75" transform="skewX(-16)">
      <animate attributeName="x" values="-320;1450" dur="5.5s" begin="0.8s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
